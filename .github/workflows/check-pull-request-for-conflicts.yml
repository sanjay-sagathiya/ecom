name: Create Staging PR

on:
  pull_request:
    types: [closed]
    branches:
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  create-staging-pr:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Create PR from merged branch to staging
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "Merged branch: $HEAD_BRANCH"

          # Check if PR already exists
          PR_NUMBER=$(gh pr list \
            --head "$HEAD_BRANCH" \
            --base staging \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$PR_NUMBER" ]; then
            PR_URL=$(gh pr create \
              --head "$HEAD_BRANCH" \
              --base staging \
              --title "Merge $HEAD_BRANCH into staging" \
              --body "This PR was automatically created after the branch was merged into master.")

            PR_NUMBER=$(basename "$PR_URL")
          fi

          # Add label
          gh pr edit "$PR_NUMBER" --add-label "ready for testing"
