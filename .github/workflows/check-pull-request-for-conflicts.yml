name: Create Staging PR

on:
  pull_request:
    types:
      - closed
    branches:
      - master

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  create-staging-pr:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Create PR to staging
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const head = context.payload.pull_request.head.ref;
            const base = "staging";

            console.log(`Creating PR: ${head} -> ${base}`);

            // Check if an open PR already exists
            const { data: existing } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${head}`,
              base
            });

            let pr;

            if (existing.length > 0) {
              console.log(`PR already exists: #${existing[0].number}`);
              pr = existing[0];
            } else {
              const { data: created } = await github.rest.pulls.create({
                owner,
                repo,
                title: `Merge ${head} into staging`,
                head,
                base,
                body: "This PR was automatically created after the branch was merged into `master`."
              });

              console.log(`Created PR #${created.number}`);
              pr = created;
            }

            // Add label
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr.number,
              labels: ["ready for testing"]
            });

            console.log(`Label added to PR #${pr.number}`);
